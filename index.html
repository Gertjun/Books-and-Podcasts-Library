<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Library</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #1a1a1a;
      --paper:     #faf8f4;
      --accent:    #c75b3a;
      --accent-lt: #f5e8e3;
      --muted:     #6b6459;
      --rule:      #e0dbd3;
      --card:      #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 3.5rem 2rem 2.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.6rem, 6vw, 4rem);
      line-height: 1.05;
      color: var(--ink);
    }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 480px;
    }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ── GRID ── */
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    a.source-card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 1.6rem 1.6rem 1.4rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
    }

    a.source-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.09);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-type {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.75rem;
    }

    .card-meta {
      display: flex;
      gap: 1rem;
      margin-top: auto;
      padding-top: 1.1rem;
      border-top: 1px solid var(--rule);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-arrow {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      color: var(--rule);
      transition: color 0.2s;
    }

    a.source-card:hover .card-arrow {
      color: var(--accent);
    }

    /* ── EMPTY STATE ── */
    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 3rem 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header, main { padding-left: 1.1rem; padding-right: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Reading Notes</p>
  <h1>My Library</h1>
  <p class="subtitle">Books and podcasts — key ideas, quotes, and episode notes.</p>
</header>

<main>
  <div class="library-grid" id="grid"></div>
</main>

<script src="data.js"></script>
<script>
  function slugify(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function countEpisodes(source) {
    return (source.episodes || []).length;
  }

  function countIdeas(source) {
    return (source.keyIdeas || []).length + (source.quotes || []).length;
  }

  const grid = document.getElementById('grid');

  if (!sources || sources.length === 0) {
    grid.innerHTML = '<p class="empty">No sources yet — add one in data.js to get started.</p>';
  } else {
    grid.innerHTML = sources.map(source => {
      const slug = slugify(source.title);
      const epCount = countEpisodes(source);
      const ideaCount = countIdeas(source);
      return `
        <a class="source-card" href="source.html?s=${slug}">
          <svg class="card-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="10" x2="15" y2="10"/><polyline points="11 6 15 10 11 14"/>
          </svg>
          <p class="card-type">${source.type}</p>
          <h2 class="card-title">${source.title}</h2>
          <div class="card-meta">
            ${epCount > 0 ? `<span>📖 ${epCount} episode${epCount !== 1 ? 's' : ''}</span>` : ''}
            ${ideaCount > 0 ? `<span>💡 ${ideaCount} note${ideaCount !== 1 ? 's' : ''}</span>` : ''}
          </div>
        </a>`;
    }).join('');
  }
</script>
</body>
</html>
