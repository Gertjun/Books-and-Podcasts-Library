<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Library</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #1a1a1a;
      --paper:     #faf8f4;
      --accent:    #c75b3a;
      --accent-lt: #f5e8e3;
      --muted:     #6b6459;
      --rule:      #e0dbd3;
      --card:      #ffffff;
      --green:     #2a7a4f;
      --tip-bg:    #f0ede8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; min-height: 100vh; }

    /* ── HEADER ── */
    header { border-bottom: 2px solid var(--ink); padding: 3.5rem 2rem 2.5rem; max-width: 900px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .header-text .eyebrow { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.4rem, 6vw, 4rem); line-height: 1.05; color: var(--ink); }
    .subtitle { margin-top: 0.6rem; color: var(--muted); font-size: 0.92rem; }
    .add-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 0.45rem; background: var(--accent); color: #fff; font-size: 0.85rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 24px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.15s; white-space: nowrap; }
    .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── PAGE LAYOUT ── */
    .page-body { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem 6rem; display: grid; grid-template-columns: 200px 1fr; gap: 2rem; align-items: start; }

    /* ── FILTER SIDEBAR ── */
    .filter-sidebar { position: sticky; top: 1.5rem; }
    .filter-section { margin-bottom: 1.6rem; }
    .filter-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; display: block; }
    .filter-option { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--ink); padding: 0.3rem 0; cursor: pointer; user-select: none; }
    .filter-option input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .filter-divider { border: none; border-top: 1px solid var(--rule); margin: 1.2rem 0; }
    .sort-select { width: 100%; font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--ink); background: var(--card); border: 1.5px solid var(--rule); border-radius: 8px; padding: 0.5rem 0.7rem; outline: none; cursor: pointer; transition: border-color 0.15s; }
    .sort-select:focus { border-color: var(--accent); }
    .filter-reset { font-size: 0.78rem; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; margin-top: 0.8rem; text-decoration: underline; text-underline-offset: 3px; }
    .result-count { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; }

    /* ── GRID ── */
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.1rem; }

    /* ── CARD ── */
    .source-card-wrap { position: relative; }

    a.source-card { display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--rule); border-radius: 12px; padding: 1.4rem 1.4rem 1.2rem; text-decoration: none; color: inherit; transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s; }
    a.source-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.09); border-color: var(--accent); transform: translateY(-2px); }

    .card-type { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
    .card-title { font-family: 'DM Serif Display', serif; font-size: 1.35rem; line-height: 1.2; color: var(--ink); margin-bottom: 0.4rem; }
    .card-date { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem; }
    .card-meta { display: flex; gap: 1rem; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--rule); font-size: 0.76rem; color: var(--muted); }

    /* ⋯ MENU BUTTON ON CARD */
    .card-menu-btn {
      position: absolute; top: 0.75rem; right: 0.75rem;
      width: 1.8rem; height: 1.8rem;
      border-radius: 50%; border: none;
      background: var(--card); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      z-index: 2;
    }
    .source-card-wrap:hover .card-menu-btn { opacity: 1; }
    .card-menu-btn:hover { background: var(--tip-bg); color: var(--ink); }
    /* Always visible on touch devices */
    @media (hover: none) { .card-menu-btn { opacity: 1; } }

    .empty { color: var(--muted); font-size: 0.9rem; padding: 2rem 0; }

    /* ── DROPDOWN MENU ── */
    .dropdown {
      position: fixed; background: var(--card); border: 1px solid var(--rule);
      border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      padding: 0.4rem; z-index: 500; min-width: 150px; display: none;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.8rem;
      border-radius: 6px; font-size: 0.86rem; font-weight: 500; cursor: pointer;
      color: var(--ink); transition: background 0.12s; border: none;
      background: none; width: 100%; text-align: left;
    }
    .dropdown-item:hover { background: var(--tip-bg); }
    .dropdown-item--danger { color: #b03a2e; }
    .dropdown-item--danger:hover { background: #fdf0ef; }
    .dropdown-divider { border: none; border-top: 1px solid var(--rule); margin: 0.3rem 0; }

    /* ── CONFIRM ── */
    .confirm-dialog { position: fixed; inset: 0; background: rgba(26,26,26,0.55); z-index: 600; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .confirm-dialog.open { display: flex; }
    .confirm-box { background: var(--card); border-radius: 14px; padding: 1.8rem; max-width: 360px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.18); text-align: center; }
    .confirm-box h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
    .confirm-box p { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.4rem; }
    .confirm-actions { display: flex; gap: 0.7rem; }
    .btn-danger { flex: 1; background: #b03a2e; color: #fff; border: none; border-radius: 24px; padding: 0.7rem; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn-danger:hover { opacity: 0.88; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; color: var(--ink); }
    .modal-close { position: absolute; top: 1.2rem; right: 1.2rem; background: none; border: none; font-size: 1.3rem; color: var(--muted); cursor: pointer; }
    .modal-close:hover { color: var(--ink); }

    /* ── FORM ── */
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; font-family: 'Inter', sans-serif; font-size: 0.92rem; color: var(--ink); background: var(--paper); border: 1.5px solid var(--rule); border-radius: 8px; padding: 0.6rem 0.85rem; outline: none; transition: border-color 0.15s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 0.76rem; color: var(--muted); margin-top: 0.3rem; }
    .form-actions { display: flex; gap: 0.7rem; margin-top: 1.5rem; }
    .btn-primary { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 24px; padding: 0.7rem 1.2rem; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: none; border: 1.5px solid var(--rule); border-radius: 24px; padding: 0.7rem 1.2rem; font-size: 0.88rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(4rem); background: var(--ink); color: #fff; font-size: 0.85rem; font-weight: 500; padding: 0.7rem 1.4rem; border-radius: 24px; z-index: 700; opacity: 0; transition: opacity 0.25s, transform 0.25s; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: #b03a2e; }

    @media (max-width: 680px) {
      .page-body { grid-template-columns: 1fr; padding-left: 1.1rem; padding-right: 1.1rem; }
      .filter-sidebar { position: static; background: var(--card); border: 1px solid var(--rule); border-radius: 10px; padding: 1.2rem; }
      header { padding-left: 1.1rem; padding-right: 1.1rem; }
      .modal { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <p class="eyebrow">Reading Notes</p>
    <h1>My Library</h1>
    <p class="subtitle">Books and podcasts — key ideas, quotes, and episode notes.</p>
  </div>
  <button class="add-btn" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
    Add book
  </button>
</header>

<div class="page-body">
  <aside class="filter-sidebar">
    <div class="filter-section">
      <span class="filter-label">Content type</span>
      <div id="type-filters"></div>
    </div>
    <hr class="filter-divider" />
    <div class="filter-section">
      <span class="filter-label">Sort by</span>
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="title-asc">Title A → Z</option>
        <option value="title-desc">Title Z → A</option>
      </select>
    </div>
    <hr class="filter-divider" />
    <button class="filter-reset" onclick="resetFilters()">Reset filters</button>
  </aside>

  <div>
    <p class="result-count" id="result-count"></p>
    <div class="library-grid" id="grid"></div>
  </div>
</div>

<!-- ADD / EDIT SOURCE MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 class="modal-title" id="modal-title">Add a book or podcast</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="f-title" placeholder="e.g. The Making of a Manager" />
    </div>
    <div class="form-group">
      <label>Type *</label>
      <select id="f-type">
        <option value="Book">Book</option>
        <option value="Podcast">Podcast</option>
        <option value="Book &amp; Podcast">Book &amp; Podcast</option>
        <option value="Article">Article</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Link (optional)</label>
      <input type="url" id="f-link" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label>Link label (optional)</label>
      <input type="text" id="f-link-label" placeholder="e.g. View on Goodreads ↗" />
    </div>
    <div id="f-ideas-group" class="form-group">
      <label>Key ideas (optional)</label>
      <textarea id="f-ideas" placeholder="One idea per line. Format: Heading | Description"></textarea>
      <p class="form-hint">Use <strong>Heading | Text</strong> format per line.</p>
    </div>
    <div id="f-quotes-group" class="form-group">
      <label>Quotes (optional)</label>
      <textarea id="f-quotes" placeholder="One quote per line. Format: Quote | Attribution"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-btn" onclick="saveSource()">Save to library</button>
    </div>
  </div>
</div>

<!-- DROPDOWN MENU -->
<div class="dropdown" id="dropdown">
  <button class="dropdown-item" id="dd-edit-btn">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4l5 5-9 9H2v-5L11 4z"/></svg>
    Edit
  </button>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item dropdown-item--danger" id="dd-delete-btn">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 17 6"/><path d="M8 6V4h4v2"/><path d="M19 6l-1 12a2 2 0 01-2 2H4a2 2 0 01-2-2L1 6"/></svg>
    Delete
  </button>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-dialog" id="confirm-dialog">
  <div class="confirm-box">
    <h3>Are you sure?</h3>
    <p id="confirm-msg">This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
  const GITHUB_USER  = 'Gertjun';
  const GITHUB_REPO  = 'Book-and-Podcasts-Library';
  const GITHUB_FILE  = 'data.js';
  const GITHUB_TOKEN = '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';
  const API_BASE     = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;

  const DOTS_SVG = `<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="4" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="16" r="1.5"/></svg>`;

  function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
  function today()    { return new Date().toISOString().split('T')[0]; }
  function formatDate(s) {
    if (!s) return '';
    return new Date(s + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ── GITHUB HELPERS ──
  async function fetchCurrentFile() {
    const r = await fetch(API_BASE, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) throw new Error(`GitHub read failed: ${r.status}`);
    return r.json();
  }
  async function pushFile(content, sha, msg) {
    const r = await fetch(API_BASE, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(content))), sha }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Write failed'); }
  }
  function buildDataJs(arr) {
    return `// ============================================================\n//  DATA FILE\n// ============================================================\n\nconst sources = ${JSON.stringify(arr, null, 2)};\n`;
  }
  function parseLines(raw) {
    return raw.split('\n').map(l => l.trim()).filter(Boolean).map(l => l.split('|').map(p => p.trim()));
  }

  // ── TOAST ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3500);
  }

  // ── FILTERS ──
  function buildTypeFilters() {
    const types = [...new Set(sources.map(s => s.type))].sort();
    document.getElementById('type-filters').innerHTML = types.map(t => `
      <label class="filter-option">
        <input type="checkbox" value="${t}" checked onchange="applyFilters()" />${t}
      </label>`).join('');
  }

  function applyFilters() {
    const types  = new Set([...document.querySelectorAll('#type-filters input:checked')].map(e => e.value));
    const sort   = document.getElementById('sort-select').value;
    let filtered = sources.filter(s => types.has(s.type));
    filtered.sort((a, b) => {
      if (sort === 'date-desc')  return (b.dateAdded||'').localeCompare(a.dateAdded||'');
      if (sort === 'date-asc')   return (a.dateAdded||'').localeCompare(b.dateAdded||'');
      if (sort === 'title-asc')  return a.title.localeCompare(b.title);
      if (sort === 'title-desc') return b.title.localeCompare(a.title);
    });
    renderGrid(filtered);
    const shown = filtered.length, total = sources.length;
    document.getElementById('result-count').textContent =
      shown === total ? `${total} entr${total !== 1 ? 'ies' : 'y'}` : `${shown} of ${total} entries`;
  }

  function resetFilters() {
    document.querySelectorAll('#type-filters input').forEach(e => e.checked = true);
    document.getElementById('sort-select').value = 'date-desc';
    applyFilters();
  }

  // ── RENDER GRID ──
  function renderGrid(list) {
    const grid = document.getElementById('grid');
    if (!list || !list.length) { grid.innerHTML = '<p class="empty">No entries match the current filters.</p>'; return; }
    grid.innerHTML = list.map(source => {
      const slug = slugify(source.title);
      const epCount   = (source.episodes || []).length;
      const ideaCount = (source.keyIdeas || []).length + (source.quotes || []).length;
      return `
        <div class="source-card-wrap">
          <button class="card-menu-btn" data-slug="${slug}" onclick="openDropdown(event, '${slug}')" title="Options">${DOTS_SVG}</button>
          <a class="source-card" href="source.html?s=${slug}">
            <p class="card-type">${source.type}</p>
            <h2 class="card-title">${source.title}</h2>
            ${source.dateAdded ? `<p class="card-date">Added ${formatDate(source.dateAdded)}</p>` : ''}
            <div class="card-meta">
              ${epCount   > 0 ? `<span>📖 ${epCount} episode${epCount !== 1 ? 's' : ''}</span>` : ''}
              ${ideaCount > 0 ? `<span>💡 ${ideaCount} note${ideaCount !== 1 ? 's' : ''}</span>` : ''}
            </div>
          </a>
        </div>`;
    }).join('');
  }

  // ── DROPDOWN ──
  let ddSlug = null;
  const dropdown = document.getElementById('dropdown');

  function openDropdown(e, slug) {
    e.preventDefault(); e.stopPropagation();
    ddSlug = slug;
    const rect = e.currentTarget.getBoundingClientRect();
    dropdown.style.left = Math.min(rect.right, window.innerWidth - 165) + 'px';
    dropdown.style.top  = (rect.bottom + 6) + 'px';
    dropdown.classList.add('open');
  }

  document.addEventListener('click', () => dropdown.classList.remove('open'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { dropdown.classList.remove('open'); closeConfirm(); closeModal(); } });

  document.getElementById('dd-edit-btn').addEventListener('click', () => {
    dropdown.classList.remove('open');
    const src = sources.find(s => slugify(s.title) === ddSlug);
    if (!src) return;
    openEditModal(src);
  });

  document.getElementById('dd-delete-btn').addEventListener('click', () => {
    dropdown.classList.remove('open');
    const src = sources.find(s => slugify(s.title) === ddSlug);
    openConfirm(`Delete "${src ? src.title : ddSlug}"? All notes and episodes will be lost.`, () => deleteSource(ddSlug));
  });

  // ── CONFIRM ──
  let confirmCb = null;
  function openConfirm(msg, cb) { document.getElementById('confirm-msg').textContent = msg; confirmCb = cb; document.getElementById('confirm-dialog').classList.add('open'); }
  function closeConfirm() { document.getElementById('confirm-dialog').classList.remove('open'); confirmCb = null; }
  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!confirmCb) return;
    const btn = document.getElementById('confirm-delete-btn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    await confirmCb();
    btn.disabled = false; btn.textContent = 'Delete';
    closeConfirm();
  });

  // ── ADD MODAL ──
  let editingSlug = null;

  function openModal() {
    editingSlug = null;
    document.getElementById('modal-title').textContent = 'Add a book or podcast';
    document.getElementById('save-btn').textContent = 'Save to library';
    document.getElementById('f-ideas-group').style.display = '';
    document.getElementById('f-quotes-group').style.display = '';
    clearForm();
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function openEditModal(src) {
    editingSlug = slugify(src.title);
    document.getElementById('modal-title').textContent = 'Edit entry';
    document.getElementById('save-btn').textContent = 'Save changes';
    // Hide bulk idea/quote fields in edit mode (edit individually on source page)
    document.getElementById('f-ideas-group').style.display = 'none';
    document.getElementById('f-quotes-group').style.display = 'none';
    document.getElementById('f-title').value = src.title;
    // Set type
    const typeEl = document.getElementById('f-type');
    [...typeEl.options].forEach(o => o.selected = o.value === src.type);
    document.getElementById('f-link').value      = src.link      || '';
    document.getElementById('f-link-label').value = src.linkLabel || '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); clearForm(); editingSlug = null; }
  function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
  function clearForm() {
    ['f-title','f-link','f-link-label','f-ideas','f-quotes'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('f-type').selectedIndex = 0;
  }

  async function saveSource() {
    const title     = document.getElementById('f-title').value.trim();
    if (!title) { showToast('Please enter a title.', 'error'); return; }
    const type      = document.getElementById('f-type').value;
    const link      = document.getElementById('f-link').value.trim();
    const linkLabel = document.getElementById('f-link-label').value.trim();
    const btn       = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const meta       = await fetchCurrentFile();
      const current    = atob(meta.content.replace(/\n/g, ''));
      const match      = current.match(/const sources = (\[[\s\S]*\]);/);
      if (!match) throw new Error('Could not parse data.js');
      const allSources = JSON.parse(match[1]);

      if (editingSlug) {
        // Edit existing
        const idx = allSources.findIndex(s => slugify(s.title) === editingSlug);
        if (idx === -1) throw new Error('Source not found');
        allSources[idx].title     = title;
        allSources[idx].type      = type;
        allSources[idx].link      = link      || undefined;
        allSources[idx].linkLabel = linkLabel || undefined;
        // Mirror in local array
        const li = sources.findIndex(s => slugify(s.title) === editingSlug);
        if (li !== -1) { sources[li].title = title; sources[li].type = type; sources[li].link = link; sources[li].linkLabel = linkLabel; }
        await pushFile(buildDataJs(allSources), meta.sha, `Edit: ${title}`);
        showToast('✓ Changes saved!', 'success');
      } else {
        // Add new
        const ideasRaw  = (document.getElementById('f-ideas').value || '').trim();
        const quotesRaw = (document.getElementById('f-quotes').value || '').trim();
        const keyIdeas  = ideasRaw  ? parseLines(ideasRaw).map(p => ({ heading: p[0], text: p[1] || '' })) : [];
        const quotes    = quotesRaw ? parseLines(quotesRaw).map(p => ({ text: p[0], attribution: p[1] || '' })) : [];
        const newSrc    = { title, type, dateAdded: today(), ...(link ? { link } : {}), ...(linkLabel ? { linkLabel } : {}), keyIdeas, quotes, episodes: [] };
        allSources.push(newSrc);
        sources.push(newSrc);
        await pushFile(buildDataJs(allSources), meta.sha, `Add: ${title}`);
        showToast('✓ Saved to library!', 'success');
      }

      buildTypeFilters();
      applyFilters();
      closeModal();
    } catch (err) {
      console.error(err); showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = editingSlug ? 'Save changes' : 'Save to library';
    }
  }

  // ── DELETE SOURCE ──
  async function deleteSource(slug) {
    try {
      const meta       = await fetchCurrentFile();
      const allSources = JSON.parse(atob(meta.content.replace(/\n/g, '')).match(/const sources = (\[[\s\S]*\]);/)[1]);
      const idx        = allSources.findIndex(s => slugify(s.title) === slug);
      if (idx === -1) throw new Error('Source not found');
      const removed    = allSources.splice(idx, 1)[0];
      await pushFile(buildDataJs(allSources), meta.sha, `Delete: ${removed.title}`);
      const li = sources.findIndex(s => slugify(s.title) === slug);
      if (li !== -1) sources.splice(li, 1);
      buildTypeFilters(); applyFilters();
      showToast('✓ Deleted', 'success');
    } catch (err) { showToast('Error: ' + err.message, 'error'); }
  }

  // ── INIT ──
  buildTypeFilters();
  applyFilters();
</script>
</body>
</html>
