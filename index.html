<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Library</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #1a1a1a;
      --paper:     #faf8f4;
      --accent:    #c75b3a;
      --accent-lt: #f5e8e3;
      --muted:     #6b6459;
      --rule:      #e0dbd3;
      --card:      #ffffff;
      --green:     #2a7a4f;
      --green-lt:  #e6f4ed;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 3.5rem 2rem 2.5rem;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-text .eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.05;
      color: var(--ink);
    }

    .subtitle {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    /* ── ADD BUTTON ── */
    .add-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ── GRID ── */
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    a.source-card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 1.6rem 1.6rem 1.4rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
    }

    a.source-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.09);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-type {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.75rem;
    }

    .card-meta {
      display: flex;
      gap: 1rem;
      margin-top: auto;
      padding-top: 1.1rem;
      border-top: 1px solid var(--rule);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-arrow {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      color: var(--rule);
      transition: color 0.2s;
    }

    a.source-card:hover .card-arrow { color: var(--accent); }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 3rem 0;
    }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      position: relative;
    }

    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
      color: var(--ink);
    }

    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }

    .modal-close:hover { color: var(--ink); }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      background: var(--paper);
      border: 1.5px solid var(--rule);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-hint {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .form-actions {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.5rem;
    }

    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 0.7rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: none;
      border: 1.5px solid var(--rule);
      border-radius: 24px;
      padding: 0.7rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--ink);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.7rem 1.4rem;
      border-radius: 24px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: var(--green); }
    .toast.error   { background: #b03a2e; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header, main { padding-left: 1.1rem; padding-right: 1.1rem; }
      .modal { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <p class="eyebrow">Reading Notes</p>
    <h1>My Library</h1>
    <p class="subtitle">Books and podcasts — key ideas, quotes, and episode notes.</p>
  </div>
  <button class="add-btn" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
    Add book
  </button>
</header>

<main>
  <div class="library-grid" id="grid"></div>
</main>

<!-- ADD BOOK MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 class="modal-title">Add a book or podcast</h2>

    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="f-title" placeholder="e.g. The Making of a Manager" />
    </div>

    <div class="form-group">
      <label>Type *</label>
      <select id="f-type">
        <option value="Book">Book</option>
        <option value="Podcast">Podcast</option>
        <option value="Book &amp; Podcast">Book &amp; Podcast</option>
        <option value="Article">Article</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Link (optional)</label>
      <input type="url" id="f-link" placeholder="https://..." />
      <p class="form-hint">A URL to the book, podcast, or a summary.</p>
    </div>

    <div class="form-group">
      <label>Link label (optional)</label>
      <input type="text" id="f-link-label" placeholder="e.g. View on Goodreads ↗" />
    </div>

    <div class="form-group">
      <label>Key ideas (optional)</label>
      <textarea id="f-ideas" placeholder="One idea per line. Format: Heading | Description&#10;e.g. On Trust | Trust is built through consistency."></textarea>
      <p class="form-hint">Each line becomes a card. Use <strong>Heading | Text</strong> format, or just text.</p>
    </div>

    <div class="form-group">
      <label>Quotes (optional)</label>
      <textarea id="f-quotes" placeholder="One quote per line. Format: Quote text | Attribution&#10;e.g. Clarity is kindness. | Kim Scott"></textarea>
      <p class="form-hint">Use <strong>Quote | Attribution</strong> format per line.</p>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-btn" onclick="saveSource()">Save to library</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
  // ── CONFIG ──
  const GITHUB_USER = 'Gertjun';
  const GITHUB_REPO = 'Book-and-Podcasts-Library';
  const GITHUB_FILE = 'data.js';
  const GITHUB_TOKEN = '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';
  const API_BASE    = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;

  // ── SLUGIFY ──
  function slugify(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  // ── RENDER GRID ──
  function renderGrid(sourceList) {
    const grid = document.getElementById('grid');
    if (!sourceList || sourceList.length === 0) {
      grid.innerHTML = '<p class="empty">No entries yet — tap "Add book" to get started.</p>';
      return;
    }
    grid.innerHTML = sourceList.map(source => {
      const slug = slugify(source.title);
      const epCount = (source.episodes || []).length;
      const ideaCount = (source.keyIdeas || []).length + (source.quotes || []).length;
      return `
        <a class="source-card" href="source.html?s=${slug}">
          <svg class="card-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="10" x2="15" y2="10"/><polyline points="11 6 15 10 11 14"/>
          </svg>
          <p class="card-type">${source.type}</p>
          <h2 class="card-title">${source.title}</h2>
          <div class="card-meta">
            ${epCount > 0 ? `<span>📖 ${epCount} episode${epCount !== 1 ? 's' : ''}</span>` : ''}
            ${ideaCount > 0 ? `<span>💡 ${ideaCount} note${ideaCount !== 1 ? 's' : ''}</span>` : ''}
          </div>
        </a>`;
    }).join('');
  }

  renderGrid(sources);

  // ── MODAL ──
  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-title').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    clearForm();
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function clearForm() {
    ['f-title','f-link','f-link-label','f-ideas','f-quotes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-type').selectedIndex = 0;
  }

  // ── TOAST ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  // ── PARSE FORM ──
  function parseLines(raw, separator = '|') {
    return raw.split('\n')
      .map(l => l.trim())
      .filter(Boolean)
      .map(l => {
        const parts = l.split(separator).map(p => p.trim());
        return parts;
      });
  }

  // ── SAVE ──
  async function saveSource() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { showToast('Please enter a title.', 'error'); return; }

    const type      = document.getElementById('f-type').value;
    const link      = document.getElementById('f-link').value.trim();
    const linkLabel = document.getElementById('f-link-label').value.trim();
    const ideasRaw  = document.getElementById('f-ideas').value.trim();
    const quotesRaw = document.getElementById('f-quotes').value.trim();

    // Build key ideas
    const keyIdeas = ideasRaw ? parseLines(ideasRaw).map(parts => ({
      heading: parts[0],
      text: parts[1] || '',
    })) : [];

    // Build quotes
    const quotes = quotesRaw ? parseLines(quotesRaw).map(parts => ({
      text: parts[0],
      attribution: parts[1] || '',
    })) : [];

    const newSource = {
      title,
      type,
      ...(link ? { link } : {}),
      ...(linkLabel ? { linkLabel } : {}),
      keyIdeas,
      quotes,
      episodes: [],
    };

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      // 1. Fetch current file from GitHub to get SHA
      const metaRes = await fetch(API_BASE, {
        headers: {
          'Authorization': `Bearer ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github+json',
        }
      });

      if (!metaRes.ok) throw new Error(`GitHub read failed: ${metaRes.status}`);
      const meta = await metaRes.json();
      const sha = meta.sha;

      // 2. Decode current content and append new source
      const currentContent = atob(meta.content.replace(/\n/g, ''));
      const sourcesMatch = currentContent.match(/const sources = (\[[\s\S]*\]);/);
      if (!sourcesMatch) throw new Error('Could not parse data.js sources array.');

      const existingSources = JSON.parse(sourcesMatch[1]);
      existingSources.push(newSource);

      // 3. Rebuild data.js with updated sources array
      const newDataJs = buildDataJs(existingSources);
      const encoded = btoa(unescape(encodeURIComponent(newDataJs)));

      // 4. Push back to GitHub
      const pushRes = await fetch(API_BASE, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `Add: ${title}`,
          content: encoded,
          sha,
        }),
      });

      if (!pushRes.ok) {
        const err = await pushRes.json();
        throw new Error(err.message || `GitHub write failed: ${pushRes.status}`);
      }

      // 5. Update UI
      sources.push(newSource);
      renderGrid(sources);
      closeModal();
      showToast('✓ Saved to library!', 'success');

    } catch (err) {
      console.error(err);
      showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save to library';
    }
  }

  // ── BUILD data.js ──
  function buildDataJs(sourcesArray) {
    const json = JSON.stringify(sourcesArray, null, 2);
    return `// ============================================================
//  DATA FILE — add books, podcasts, notes and episodes here
//
//  STRUCTURE:
//  Each entry in \`sources\` is a book or podcast.
//  Each source has:
//    - title       : displayed as the page/section heading
//    - type        : "book" | "podcast" (shown as eyebrow label)
//    - link        : optional URL shown below the title
//    - linkLabel   : label for the link (default: "View source ↗")
//    - keyIdeas    : array of { heading, text } cards
//    - quotes      : array of { text, attribution } blockquotes
//    - episodes    : array of episode objects (see below)
//
//  EPISODE STRUCTURE:
//    - number  : episode number (shown in the badge)
//    - title   : episode title
//    - tips    : array of tip strings
//    - qa      : array of { q, a } objects  ← optional
// ============================================================

const sources = ${json};
`;
  }
</script>
</body>
</html>
