<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #1a1a1a;
      --paper:     #faf8f4;
      --accent:    #c75b3a;
      --accent-lt: #f5e8e3;
      --muted:     #6b6459;
      --rule:      #e0dbd3;
      --card:      #ffffff;
      --tip-bg:    #f0ede8;
      --green:     #2a7a4f;
      --green-lt:  #e6f4ed;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── BACK BAR ── */
    .back-bar {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 2rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--accent); }

    .action-buttons { display: flex; gap: 0.5rem; }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .action-btn:hover { opacity: 0.88; }

    .action-btn--secondary {
      background: none;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }

    /* ── HEADER ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 2rem;
      max-width: 860px;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      line-height: 1.1;
      color: var(--ink);
    }

    .source-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--rule);
      padding-top: 2rem;
      margin-top: 2.5rem;
      margin-bottom: 1.2rem;
    }

    /* ── NOTES GRID ── */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .note-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 1.1rem 1.2rem;
      font-size: 0.9rem;
      color: var(--ink);
    }

    .note-card--has-image { grid-column: 1 / -1; }

    .note-card strong {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .note-card-img {
      display: block;
      width: 100%;
      max-width: 560px;
      height: auto;
      border-radius: 6px;
      margin-top: 0.9rem;
      border: 1px solid var(--rule);
    }

    /* ── QUOTES ── */
    .quote-block {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.2rem 1rem 1.4rem;
      background: var(--accent-lt);
      border-radius: 0 6px 6px 0;
      margin-bottom: 1.2rem;
    }

    .quote-block p {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      font-style: italic;
      line-height: 1.6;
      color: var(--ink);
    }

    .quote-block cite {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      font-style: normal;
      font-weight: 500;
      color: var(--muted);
    }

    /* ── EPISODES ── */
    .episodes-list { display: flex; flex-direction: column; gap: 0.6rem; }

    details.episode {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    details.episode[open] {
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border-color: var(--accent);
    }

    details.episode summary {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    details.episode summary::-webkit-details-marker { display: none; }

    .ep-num {
      flex-shrink: 0;
      width: 2rem; height: 2rem;
      border-radius: 50%;
      background: var(--tip-bg);
      color: var(--accent);
      font-size: 0.72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    details.episode[open] .ep-num { background: var(--accent); color: #fff; }

    .ep-title { flex: 1; font-weight: 600; font-size: 0.97rem; color: var(--ink); }

    .ep-arrow {
      width: 1.1rem; height: 1.1rem;
      color: var(--muted); flex-shrink: 0;
      transition: transform 0.2s;
    }

    details.episode[open] .ep-arrow { transform: rotate(180deg); }

    .episode-body { padding: 0 1.25rem 1.25rem; border-top: 1px solid var(--rule); }

    /* ── TIPS ── */
    .tips { display: flex; flex-direction: column; gap: 0.45rem; margin: 1rem 0; }

    .tip {
      display: flex; gap: 0.7rem; align-items: flex-start;
      background: var(--tip-bg); border-radius: 6px;
      padding: 0.55rem 0.8rem; font-size: 0.88rem;
    }

    .tip-icon {
      flex-shrink: 0; color: var(--accent); font-size: 0.75rem;
      font-weight: 700; margin-top: 0.15rem;
      background: var(--accent-lt); border: 1px solid var(--accent);
      border-radius: 4px; padding: 0.1rem 0.5rem;
      letter-spacing: 0.04em; white-space: nowrap;
    }

    /* ── Q&A ── */
    .qa-section { margin-top: 1.1rem; }
    .qa-item { border-top: 1px solid var(--rule); padding: 0.85rem 0; }
    .qa-item:first-child { border-top: none; }
    .qa-q { font-weight: 600; font-size: 0.88rem; color: var(--ink); margin-bottom: 0.35rem; }
    .qa-a { font-size: 0.87rem; color: #3d3730; line-height: 1.65; }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; }

    .ctrl-btn {
      font-size: 0.78rem; font-weight: 600;
      padding: 0.35rem 0.85rem; border-radius: 20px;
      border: 1.5px solid var(--rule); background: var(--card);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }

    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── NOT FOUND ── */
    .not-found { padding: 4rem 0; color: var(--muted); }
    .not-found h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 0.5rem; }
    .not-found a { color: var(--accent); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,26,26,0.55); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card); border-radius: 16px;
      width: 100%; max-width: 520px; max-height: 90vh;
      overflow-y: auto; padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative;
    }

    .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 1.4rem; color: var(--ink); }

    .modal-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      background: none; border: none; font-size: 1.3rem;
      color: var(--muted); cursor: pointer;
    }

    .modal-close:hover { color: var(--ink); }

    /* ── FORM ── */
    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%; font-family: 'Inter', sans-serif;
      font-size: 0.92rem; color: var(--ink);
      background: var(--paper); border: 1.5px solid var(--rule);
      border-radius: 8px; padding: 0.6rem 0.85rem;
      outline: none; transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }

    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-hint { font-size: 0.76rem; color: var(--muted); margin-top: 0.3rem; }

    .form-actions { display: flex; gap: 0.7rem; margin-top: 1.4rem; }

    .btn-primary {
      flex: 1; background: var(--accent); color: #fff;
      border: none; border-radius: 24px; padding: 0.7rem 1.2rem;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: none; border: 1.5px solid var(--rule); border-radius: 24px;
      padding: 0.7rem 1.2rem; font-size: 0.88rem; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }

    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--ink); color: #fff;
      font-size: 0.85rem; font-weight: 500;
      padding: 0.7rem 1.4rem; border-radius: 24px;
      z-index: 200; opacity: 0; transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: #b03a2e; }

    @media (max-width: 600px) {
      .back-bar, header, main { padding-left: 1.1rem; padding-right: 1.1rem; }
      .modal { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="back-bar">
  <a class="back-link" href="index.html">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="14 6 9 10 14 14"/><line x1="5" y1="10" x2="14" y2="10"/>
    </svg>
    My Library
  </a>
  <div class="action-buttons" id="action-buttons"></div>
</div>

<header id="page-header"></header>
<main id="app"></main>

<!-- ADD EPISODE MODAL -->
<div class="modal-overlay" id="ep-modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeEpModal()">✕</button>
    <h2 class="modal-title">Add an episode</h2>

    <div class="form-group">
      <label>Episode number *</label>
      <input type="number" id="ep-number" placeholder="e.g. 18" min="1" />
    </div>

    <div class="form-group">
      <label>Episode title *</label>
      <input type="text" id="ep-title" placeholder="e.g. How to Give Feedback Remotely" />
    </div>

    <div class="form-group">
      <label>Tips (optional)</label>
      <textarea id="ep-tips" placeholder="One tip per line&#10;e.g. Be specific, not general."></textarea>
      <p class="form-hint">Each line becomes a tip card.</p>
    </div>

    <div class="form-group">
      <label>Q&amp;A (optional)</label>
      <textarea id="ep-qa" placeholder="One Q&A per line. Format: Question | Answer"></textarea>
      <p class="form-hint">Use <strong>Question | Answer</strong> per line.</p>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" onclick="closeEpModal()">Cancel</button>
      <button class="btn-primary" id="ep-save-btn" onclick="saveEpisode()">Save episode</button>
    </div>
  </div>
</div>

<!-- ADD NOTE MODAL -->
<div class="modal-overlay" id="note-modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeNoteModal()">✕</button>
    <h2 class="modal-title">Add a note</h2>

    <div class="form-group">
      <label>Heading *</label>
      <input type="text" id="note-heading" placeholder="e.g. On Leadership" />
    </div>

    <div class="form-group">
      <label>Note *</label>
      <textarea id="note-text" placeholder="Write your note here…" style="min-height:120px;"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" onclick="closeNoteModal()">Cancel</button>
      <button class="btn-primary" id="note-save-btn" onclick="saveNote()">Save note</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
  // ── CONFIG ──
  const GITHUB_USER  = 'Gertjun';
  const GITHUB_REPO  = 'Book-and-Podcasts-Library';
  const GITHUB_FILE  = 'data.js';
  const GITHUB_TOKEN = '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';
  const API_BASE     = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;

  const PLUS_ICON = `<svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>`;
  const ARROW_SVG = `<svg class="ep-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 8 10 13 15 8"/></svg>`;

  function slugify(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function getSlugParam() {
    return new URLSearchParams(window.location.search).get('s') || '';
  }

  // ── DETECT TYPE ──
  function isBookType(source) {
    const t = (source.type || '').toLowerCase();
    return t === 'book' || t === 'article' || t === 'other';
  }

  // ── RENDER ACTION BUTTONS ──
  function renderActionButtons(source) {
    const btn = document.getElementById('action-buttons');
    if (isBookType(source)) {
      btn.innerHTML = `
        <button class="action-btn" onclick="openNoteModal()">
          ${PLUS_ICON} Add note
        </button>`;
    } else {
      btn.innerHTML = `
        <button class="action-btn" onclick="openEpModal()">
          ${PLUS_ICON} Add episode
        </button>
        <button class="action-btn action-btn--secondary" onclick="openNoteModal()">
          ${PLUS_ICON} Add note
        </button>`;
    }
  }

  // ── RENDER KEY IDEAS ──
  function renderKeyIdeas(ideas) {
    if (!ideas || !ideas.length) return '';
    return `<p class="section-label">Key Ideas</p>
      <div class="notes-grid" id="notes-grid">
        ${ideas.map(idea => `
          <div class="note-card${idea.image ? ' note-card--has-image' : ''}">
            <strong>${idea.heading}</strong>
            ${idea.text}
            ${idea.image ? `<img src="${idea.image}" alt="${idea.imageAlt || idea.heading}" class="note-card-img" />` : ''}
          </div>`).join('')}
      </div>`;
  }

  function renderQuotes(quotes) {
    if (!quotes || !quotes.length) return '';
    return quotes.map(q => `
      <div class="quote-block"><p>${q.text}</p><cite>— ${q.attribution}</cite></div>`).join('');
  }

  function renderEpisode(ep) {
    const tipsHTML = (ep.tips && ep.tips.length)
      ? `<div class="tips">${ep.tips.map((tip, i) => `<div class="tip"><span class="tip-icon">Tip ${i + 1}</span>${tip}</div>`).join('')}</div>` : '';
    const qaHTML = (ep.qa && ep.qa.length)
      ? `<div class="qa-section">${ep.qa.map(item => `<div class="qa-item"><p class="qa-q">${item.q}</p><p class="qa-a">${item.a}</p></div>`).join('')}</div>` : '';
    const body = (tipsHTML || qaHTML)
      ? tipsHTML + qaHTML
      : `<p style="font-size:0.88rem;color:var(--muted);padding-top:0.9rem;">No notes recorded for this episode yet.</p>`;
    return `
      <details class="episode">
        <summary>
          <span class="ep-num">${ep.number}</span>
          <span class="ep-title">${ep.title}</span>
          ${ARROW_SVG}
        </summary>
        <div class="episode-body">${body}</div>
      </details>`;
  }

  let currentSource = null;

  function renderSource(source) {
    currentSource = source;
    document.title = source.title;

    document.getElementById('page-header').innerHTML = `
      <p class="eyebrow">${source.type}</p>
      <h1>${source.title}</h1>
      ${source.link ? `<a class="source-link" href="${source.link}" target="_blank" rel="noopener">${source.linkLabel || 'View source ↗'}</a>` : ''}`;

    renderActionButtons(source);

    const hasEpisodes = source.episodes && source.episodes.length;
    const showEpisodeSection = !isBookType(source);

    const episodesHTML = showEpisodeSection ? `
      <p class="section-label">Episodes</p>
      <div class="controls">
        <button class="ctrl-btn" onclick="setAll(true)">Expand all</button>
        <button class="ctrl-btn" onclick="setAll(false)">Collapse all</button>
      </div>
      <div class="episodes-list" id="episodes-list">
        ${hasEpisodes
          ? source.episodes.map(renderEpisode).join('')
          : `<p style="font-size:0.9rem;color:var(--muted);padding:1rem 0;">No episodes yet — tap "Add episode" to get started.</p>`}
      </div>` : '';

    document.getElementById('app').innerHTML =
      renderKeyIdeas(source.keyIdeas) +
      renderQuotes(source.quotes) +
      episodesHTML;
  }

  function renderNotFound(slug) {
    document.title = 'Not found — My Library';
    document.getElementById('page-header').innerHTML = '';
    document.getElementById('app').innerHTML = `
      <div class="not-found">
        <h2>Source not found</h2>
        <p>No entry matched <code>${slug}</code>. <a href="index.html">Back to library</a>.</p>
      </div>`;
  }

  function setAll(open) {
    document.querySelectorAll('details.episode').forEach(d => d.open = open);
  }

  // ── INIT ──
  const slug = getSlugParam();
  const source = (sources || []).find(s => slugify(s.title) === slug);
  source ? renderSource(source) : renderNotFound(slug);

  // ── TOAST ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  // ── GITHUB HELPERS ──
  async function fetchCurrentFile() {
    const res = await fetch(API_BASE, {
      headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error(`GitHub read failed: ${res.status}`);
    return res.json();
  }

  async function pushFile(content, sha, message) {
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const res = await fetch(API_BASE, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ message, content: encoded, sha }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `GitHub write failed: ${res.status}`);
    }
  }

  function buildDataJs(sourcesArray) {
    return `// ============================================================
//  DATA FILE — add books, podcasts, notes and episodes here
// ============================================================

const sources = ${JSON.stringify(sourcesArray, null, 2)};
`;
  }

  // ── EPISODE MODAL ──
  function openEpModal() {
    if (!currentSource) return;
    const nextNum = ((currentSource.episodes || []).length) + 1;
    document.getElementById('ep-number').value = nextNum;
    document.getElementById('ep-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('ep-title').focus(), 50);
  }

  function closeEpModal() {
    document.getElementById('ep-modal-overlay').classList.remove('open');
    ['ep-title','ep-tips','ep-qa'].forEach(id => document.getElementById(id).value = '');
  }

  async function saveEpisode() {
    const number = parseInt(document.getElementById('ep-number').value);
    const title  = document.getElementById('ep-title').value.trim();
    if (!title || isNaN(number)) { showToast('Please fill in number and title.', 'error'); return; }

    const tips = document.getElementById('ep-tips').value.trim().split('\n').map(l => l.trim()).filter(Boolean);
    const qa   = document.getElementById('ep-qa').value.trim().split('\n').map(l => l.trim()).filter(Boolean).map(l => {
      const parts = l.split('|').map(p => p.trim());
      return { q: parts[0], a: parts[1] || '' };
    });

    const btn = document.getElementById('ep-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const meta = await fetchCurrentFile();
      const current = atob(meta.content.replace(/\n/g, ''));
      const match = current.match(/const sources = (\[[\s\S]*\]);/);
      if (!match) throw new Error('Could not parse data.js');

      const allSources = JSON.parse(match[1]);
      const idx = allSources.findIndex(s => slugify(s.title) === slug);
      if (idx === -1) throw new Error('Source not found in data.js');

      allSources[idx].episodes = allSources[idx].episodes || [];
      allSources[idx].episodes.push({ number, title, tips, qa });

      await pushFile(buildDataJs(allSources), meta.sha, `Add episode: ${title}`);

      currentSource.episodes = currentSource.episodes || [];
      currentSource.episodes.push({ number, title, tips, qa });
      renderSource(currentSource);
      closeEpModal();
      showToast('✓ Episode saved!', 'success');
    } catch (err) {
      console.error(err);
      showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Save episode';
    }
  }

  // ── NOTE MODAL ──
  function openNoteModal() {
    if (!currentSource) return;
    document.getElementById('note-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('note-heading').focus(), 50);
  }

  function closeNoteModal() {
    document.getElementById('note-modal-overlay').classList.remove('open');
    ['note-heading','note-text'].forEach(id => document.getElementById(id).value = '');
  }

  async function saveNote() {
    const heading = document.getElementById('note-heading').value.trim();
    const text    = document.getElementById('note-text').value.trim();
    if (!heading || !text) { showToast('Please fill in both fields.', 'error'); return; }

    const btn = document.getElementById('note-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const meta = await fetchCurrentFile();
      const current = atob(meta.content.replace(/\n/g, ''));
      const match = current.match(/const sources = (\[[\s\S]*\]);/);
      if (!match) throw new Error('Could not parse data.js');

      const allSources = JSON.parse(match[1]);
      const idx = allSources.findIndex(s => slugify(s.title) === slug);
      if (idx === -1) throw new Error('Source not found in data.js');

      allSources[idx].keyIdeas = allSources[idx].keyIdeas || [];
      allSources[idx].keyIdeas.push({ heading, text });

      await pushFile(buildDataJs(allSources), meta.sha, `Add note: ${heading}`);

      currentSource.keyIdeas = currentSource.keyIdeas || [];
      currentSource.keyIdeas.push({ heading, text });
      renderSource(currentSource);
      closeNoteModal();
      showToast('✓ Note saved!', 'success');
    } catch (err) {
      console.error(err);
      showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Save note';
    }
  }

  // Close modals on overlay click
  document.getElementById('ep-modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeEpModal();
  });
  document.getElementById('note-modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeNoteModal();
  });
</script>
</body>
</html>
