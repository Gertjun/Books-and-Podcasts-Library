<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #1a1a1a;
      --paper:     #faf8f4;
      --accent:    #c75b3a;
      --accent-lt: #f5e8e3;
      --muted:     #6b6459;
      --rule:      #e0dbd3;
      --card:      #ffffff;
      --tip-bg:    #f0ede8;
      --green:     #2a7a4f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; min-height: 100vh; }

    /* ── BACK BAR ── */
    .back-bar { max-width: 860px; margin: 0 auto; padding: 1.5rem 2rem 0; display: flex; align-items: center; justify-content: space-between; }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; font-weight: 600; color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .back-link:hover { color: var(--accent); }
    .action-buttons { display: flex; gap: 0.5rem; }
    .action-btn { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--accent); color: #fff; font-size: 0.8rem; font-weight: 600; padding: 0.45rem 1rem; border-radius: 20px; border: none; cursor: pointer; transition: opacity 0.15s; }
    .action-btn:hover { opacity: 0.88; }
    .action-btn--secondary { background: none; color: var(--accent); border: 1.5px solid var(--accent); }

    /* ── HEADER ── */
    header { border-bottom: 2px solid var(--ink); padding: 2rem; max-width: 860px; margin: 0 auto; }
    .eyebrow { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.2rem, 5vw, 3.4rem); line-height: 1.1; color: var(--ink); }
    .source-link { display: inline-block; margin-top: 0.5rem; font-size: 0.85rem; color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

    /* ── MAIN ── */
    main { max-width: 860px; margin: 0 auto; padding: 0 2rem 6rem; }
    .section-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); border-top: 1px solid var(--rule); padding-top: 2rem; margin-top: 2.5rem; margin-bottom: 1.2rem; }

    /* ── NOTES GRID ── */
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.2rem; }

    .note-card-wrap { position: relative; }
    .note-card { background: var(--card); border: 1px solid var(--rule); border-radius: 8px; padding: 1.1rem 2.4rem 1.1rem 1.2rem; font-size: 0.9rem; color: var(--ink); }
    .note-card--has-image { grid-column: 1 / -1; }
    .note-card strong { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
    .note-card-img { display: block; width: 100%; max-width: 560px; height: auto; border-radius: 6px; margin-top: 0.9rem; border: 1px solid var(--rule); }

    /* ── QUOTES ── */
    .quote-wrap { position: relative; margin-bottom: 1.2rem; }
    .quote-block { border-left: 3px solid var(--accent); padding: 1rem 2.4rem 1rem 1.4rem; background: var(--accent-lt); border-radius: 0 6px 6px 0; }
    .quote-block p { font-family: 'DM Serif Display', serif; font-size: 1.05rem; font-style: italic; line-height: 1.6; color: var(--ink); }
    .quote-block cite { display: block; margin-top: 0.5rem; font-size: 0.8rem; font-style: normal; font-weight: 500; color: var(--muted); }

    /* ── ⋯ MENU BUTTON ── */
    .item-menu-btn {
      position: absolute; top: 0.6rem; right: 0.6rem;
      width: 1.6rem; height: 1.6rem; border-radius: 50%;
      border: none; background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s;
      z-index: 2;
    }
    .note-card-wrap:hover .item-menu-btn,
    .quote-wrap:hover .item-menu-btn,
    .episode-wrap:hover .item-menu-btn { opacity: 1; }
    .item-menu-btn:hover { background: rgba(0,0,0,0.07); color: var(--ink); }
    @media (hover: none) { .item-menu-btn { opacity: 1; } }

    /* ── EPISODES ── */
    .episodes-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .episode-wrap { position: relative; }

    details.episode { background: var(--card); border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; transition: box-shadow 0.2s; }
    details.episode[open] { box-shadow: 0 4px 20px rgba(0,0,0,0.07); border-color: var(--accent); }
    details.episode summary { display: flex; align-items: center; gap: 1rem; padding: 1rem 3rem 1rem 1.25rem; cursor: pointer; list-style: none; user-select: none; }
    details.episode summary::-webkit-details-marker { display: none; }

    .ep-num { flex-shrink: 0; width: 2rem; height: 2rem; border-radius: 50%; background: var(--tip-bg); color: var(--accent); font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    details.episode[open] .ep-num { background: var(--accent); color: #fff; }
    .ep-title { flex: 1; font-weight: 600; font-size: 0.97rem; color: var(--ink); }
    .ep-arrow { width: 1.1rem; height: 1.1rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
    details.episode[open] .ep-arrow { transform: rotate(180deg); }
    .episode-body { padding: 0 1.25rem 1.25rem; border-top: 1px solid var(--rule); }

    /* ── TIPS ── */
    .tips { display: flex; flex-direction: column; gap: 0.45rem; margin: 1rem 0; }
    .tip { display: flex; gap: 0.7rem; align-items: flex-start; background: var(--tip-bg); border-radius: 6px; padding: 0.55rem 0.8rem; font-size: 0.88rem; }
    .tip-icon { flex-shrink: 0; color: var(--accent); font-size: 0.75rem; font-weight: 700; margin-top: 0.15rem; background: var(--accent-lt); border: 1px solid var(--accent); border-radius: 4px; padding: 0.1rem 0.5rem; letter-spacing: 0.04em; white-space: nowrap; }

    /* ── Q&A ── */
    .qa-section { margin-top: 1.1rem; }
    .qa-item { border-top: 1px solid var(--rule); padding: 0.85rem 0; }
    .qa-item:first-child { border-top: none; }
    .qa-q { font-weight: 600; font-size: 0.88rem; color: var(--ink); margin-bottom: 0.35rem; }
    .qa-a { font-size: 0.87rem; color: #3d3730; line-height: 1.65; }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
    .ctrl-btn { font-size: 0.78rem; font-weight: 600; padding: 0.35rem 0.85rem; border-radius: 20px; border: 1.5px solid var(--rule); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .not-found { padding: 4rem 0; color: var(--muted); }
    .not-found h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 0.5rem; }
    .not-found a { color: var(--accent); }

    /* ── DROPDOWN ── */
    .dropdown { position: fixed; background: var(--card); border: 1px solid var(--rule); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.14); padding: 0.4rem; z-index: 500; min-width: 150px; display: none; }
    .dropdown.open { display: block; }
    .dropdown-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.86rem; font-weight: 500; cursor: pointer; color: var(--ink); transition: background 0.12s; border: none; background: none; width: 100%; text-align: left; }
    .dropdown-item:hover { background: var(--tip-bg); }
    .dropdown-item--danger { color: #b03a2e; }
    .dropdown-item--danger:hover { background: #fdf0ef; }
    .dropdown-divider { border: none; border-top: 1px solid var(--rule); margin: 0.3rem 0; }

    /* ── CONFIRM ── */
    .confirm-dialog { position: fixed; inset: 0; background: rgba(26,26,26,0.55); z-index: 600; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .confirm-dialog.open { display: flex; }
    .confirm-box { background: var(--card); border-radius: 14px; padding: 1.8rem; max-width: 360px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.18); text-align: center; }
    .confirm-box h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
    .confirm-box p { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.4rem; }
    .confirm-actions { display: flex; gap: 0.7rem; }
    .btn-danger { flex: 1; background: #b03a2e; color: #fff; border: none; border-radius: 24px; padding: 0.7rem; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn-danger:hover { opacity: 0.88; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 1.4rem; color: var(--ink); }
    .modal-close { position: absolute; top: 1.2rem; right: 1.2rem; background: none; border: none; font-size: 1.3rem; color: var(--muted); cursor: pointer; }
    .modal-close:hover { color: var(--ink); }

    /* ── FORM ── */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .form-group input, .form-group textarea { width: 100%; font-family: 'Inter', sans-serif; font-size: 0.92rem; color: var(--ink); background: var(--paper); border: 1.5px solid var(--rule); border-radius: 8px; padding: 0.6rem 0.85rem; outline: none; transition: border-color 0.15s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-hint { font-size: 0.76rem; color: var(--muted); margin-top: 0.3rem; }
    .form-actions { display: flex; gap: 0.7rem; margin-top: 1.4rem; }
    .btn-primary { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 24px; padding: 0.7rem 1.2rem; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: none; border: 1.5px solid var(--rule); border-radius: 24px; padding: 0.7rem 1.2rem; font-size: 0.88rem; font-weight: 600; color: var(--muted); cursor: pointer; }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(4rem); background: var(--ink); color: #fff; font-size: 0.85rem; font-weight: 500; padding: 0.7rem 1.4rem; border-radius: 24px; z-index: 700; opacity: 0; transition: opacity 0.25s, transform 0.25s; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: #b03a2e; }

    @media (max-width: 600px) {
      .back-bar, header, main { padding-left: 1.1rem; padding-right: 1.1rem; }
      .modal { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="back-bar">
  <a class="back-link" href="index.html">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="14 6 9 10 14 14"/><line x1="5" y1="10" x2="14" y2="10"/></svg>
    My Library
  </a>
  <div class="action-buttons" id="action-buttons"></div>
</div>

<header id="page-header"></header>
<main id="app"></main>

<!-- DROPDOWN -->
<div class="dropdown" id="dropdown">
  <button class="dropdown-item" id="dd-edit-btn">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4l5 5-9 9H2v-5L11 4z"/></svg>Edit
  </button>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item dropdown-item--danger" id="dd-delete-btn">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 17 6"/><path d="M8 6V4h4v2"/><path d="M19 6l-1 12a2 2 0 01-2 2H4a2 2 0 01-2-2L1 6"/></svg>Delete
  </button>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-dialog" id="confirm-dialog">
  <div class="confirm-box">
    <h3>Are you sure?</h3>
    <p id="confirm-msg">This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT NOTE MODAL -->
<div class="modal-overlay" id="note-modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeNoteModal()">✕</button>
    <h2 class="modal-title" id="note-modal-title">Add a note</h2>
    <div class="form-group">
      <label>Heading *</label>
      <input type="text" id="note-heading" placeholder="e.g. On Leadership" />
    </div>
    <div class="form-group">
      <label>Note *</label>
      <textarea id="note-text" style="min-height:120px;" placeholder="Write your note here…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeNoteModal()">Cancel</button>
      <button class="btn-primary" id="note-save-btn" onclick="saveNote()">Save note</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT QUOTE MODAL -->
<div class="modal-overlay" id="quote-modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeQuoteModal()">✕</button>
    <h2 class="modal-title" id="quote-modal-title">Add a quote</h2>
    <div class="form-group">
      <label>Quote *</label>
      <textarea id="quote-text" style="min-height:100px;" placeholder="The quote text…"></textarea>
    </div>
    <div class="form-group">
      <label>Attribution *</label>
      <input type="text" id="quote-attr" placeholder="e.g. Kim Scott" />
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeQuoteModal()">Cancel</button>
      <button class="btn-primary" id="quote-save-btn" onclick="saveQuote()">Save quote</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT EPISODE MODAL -->
<div class="modal-overlay" id="ep-modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeEpModal()">✕</button>
    <h2 class="modal-title" id="ep-modal-title">Add an episode</h2>
    <div class="form-group">
      <label>Episode number *</label>
      <input type="number" id="ep-number" min="1" placeholder="e.g. 18" />
    </div>
    <div class="form-group">
      <label>Episode title *</label>
      <input type="text" id="ep-title" placeholder="e.g. How to Give Feedback Remotely" />
    </div>
    <div class="form-group">
      <label>Tips (optional)</label>
      <textarea id="ep-tips" placeholder="One tip per line"></textarea>
      <p class="form-hint">Each line becomes a tip card.</p>
    </div>
    <div class="form-group">
      <label>Q&amp;A (optional)</label>
      <textarea id="ep-qa" placeholder="One Q&A per line. Format: Question | Answer"></textarea>
      <p class="form-hint">Use <strong>Question | Answer</strong> per line.</p>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeEpModal()">Cancel</button>
      <button class="btn-primary" id="ep-save-btn" onclick="saveEpisode()">Save episode</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
  const GITHUB_USER  = 'Gertjun';
  const GITHUB_REPO  = 'Book-and-Podcasts-Library';
  const GITHUB_FILE  = 'data.js';
  const GITHUB_TOKEN = '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';
  const API_BASE     = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;

  const DOTS = `<svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="4" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="16" r="1.5"/></svg>`;
  const ARROW_SVG = `<svg class="ep-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="5 8 10 13 15 8"/></svg>`;
  const PLUS = `<svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>`;

  function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
  function getParam()  { return new URLSearchParams(window.location.search).get('s') || ''; }
  function isBookType(src) { const t = (src.type||'').toLowerCase(); return t==='book'||t==='article'||t==='other'; }

  // ── GITHUB ──
  async function fetchFile() {
    const r = await fetch(API_BASE, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) throw new Error(`Read failed: ${r.status}`);
    return r.json();
  }
  async function pushFile(content, sha, msg) {
    const r = await fetch(API_BASE, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(content))), sha }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Write failed'); }
  }
  function buildDataJs(arr) { return `// ============================================================\n//  DATA FILE\n// ============================================================\n\nconst sources = ${JSON.stringify(arr, null, 2)};\n`; }
  async function saveToGitHub(mutateFn, commitMsg) {
    const meta       = await fetchFile();
    const current    = atob(meta.content.replace(/\n/g,''));
    const match      = current.match(/const sources = (\[[\s\S]*\]);/);
    if (!match) throw new Error('Could not parse data.js');
    const allSources = JSON.parse(match[1]);
    const idx        = allSources.findIndex(s => slugify(s.title) === slug);
    if (idx === -1) throw new Error('Source not found');
    mutateFn(allSources[idx]);
    await pushFile(buildDataJs(allSources), meta.sha, commitMsg);
  }

  // ── TOAST ──
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3500);
  }

  // ── RENDER ──
  function menuBtn(type, index) {
    return `<button class="item-menu-btn" onclick="openDropdown(event,'${type}',${index})" title="Options">${DOTS}</button>`;
  }

  function renderKeyIdeas(ideas) {
    if (!ideas||!ideas.length) return '';
    return `<p class="section-label">Key Ideas</p>
      <div class="notes-grid">
        ${ideas.map((idea,i) => `
          <div class="note-card-wrap${idea.image?' note-card--has-image':''}">
            ${menuBtn('note',i)}
            <div class="note-card">
              <strong>${idea.heading}</strong>${idea.text}
              ${idea.image ? `<img src="${idea.image}" alt="${idea.imageAlt||idea.heading}" class="note-card-img"/>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
  }

  function renderQuotes(quotes) {
    if (!quotes||!quotes.length) return '';
    return quotes.map((q,i) => `
      <div class="quote-wrap">
        ${menuBtn('quote',i)}
        <div class="quote-block">
          <p>${q.text}</p><cite>— ${q.attribution}</cite>
        </div>
      </div>`).join('');
  }

  function renderEpisode(ep, i) {
    const tipsHTML = (ep.tips&&ep.tips.length) ? `<div class="tips">${ep.tips.map((t,ti)=>`<div class="tip"><span class="tip-icon">Tip ${ti+1}</span>${t}</div>`).join('')}</div>` : '';
    const qaHTML   = (ep.qa&&ep.qa.length) ? `<div class="qa-section">${ep.qa.map(it=>`<div class="qa-item"><p class="qa-q">${it.q}</p><p class="qa-a">${it.a}</p></div>`).join('')}</div>` : '';
    const body     = (tipsHTML||qaHTML) ? tipsHTML+qaHTML : `<p style="font-size:0.88rem;color:var(--muted);padding-top:0.9rem;">No notes yet.</p>`;
    return `
      <div class="episode-wrap">
        ${menuBtn('episode',i)}
        <details class="episode">
          <summary>
            <span class="ep-num">${ep.number}</span>
            <span class="ep-title">${ep.title}</span>
            ${ARROW_SVG}
          </summary>
          <div class="episode-body">${body}</div>
        </details>
      </div>`;
  }

  let currentSource = null;
  const slug = getParam();

  function renderSource(src) {
    currentSource = src;
    document.title = src.title;
    document.getElementById('page-header').innerHTML = `
      <p class="eyebrow">${src.type}</p><h1>${src.title}</h1>
      ${src.link ? `<a class="source-link" href="${src.link}" target="_blank" rel="noopener">${src.linkLabel||'View source ↗'}</a>` : ''}`;

    const btns = document.getElementById('action-buttons');
    if (isBookType(src)) {
      btns.innerHTML = `<button class="action-btn" onclick="openNoteModal()">${PLUS} Add note</button>`;
    } else {
      btns.innerHTML = `
        <button class="action-btn" onclick="openEpModal()">${PLUS} Add episode</button>
        <button class="action-btn action-btn--secondary" onclick="openNoteModal()">${PLUS} Add note</button>`;
    }

    const showEpisodes = !isBookType(src);
    const hasEps = src.episodes && src.episodes.length;
    const epsHTML = showEpisodes ? `
      <p class="section-label">Episodes</p>
      <div class="controls">
        <button class="ctrl-btn" onclick="setAll(true)">Expand all</button>
        <button class="ctrl-btn" onclick="setAll(false)">Collapse all</button>
      </div>
      <div class="episodes-list">
        ${hasEps ? src.episodes.map((ep,i) => renderEpisode(ep,i)).join('') : `<p style="font-size:0.9rem;color:var(--muted);padding:1rem 0;">No episodes yet.</p>`}
      </div>` : '';

    document.getElementById('app').innerHTML =
      renderKeyIdeas(src.keyIdeas) + renderQuotes(src.quotes) + epsHTML;
  }

  function setAll(open) { document.querySelectorAll('details.episode').forEach(d => d.open = open); }

  // ── INIT ──
  const src = (sources||[]).find(s => slugify(s.title) === slug);
  if (src) renderSource(src);
  else {
    document.getElementById('page-header').innerHTML = '';
    document.getElementById('app').innerHTML = `<div class="not-found"><h2>Not found</h2><p><a href="index.html">Back to library</a></p></div>`;
  }

  // ── DROPDOWN ──
  let ddType = null, ddIndex = null;
  const dropdown = document.getElementById('dropdown');

  function openDropdown(e, type, index) {
    e.preventDefault(); e.stopPropagation();
    ddType = type; ddIndex = index;
    const rect = e.currentTarget.getBoundingClientRect();
    dropdown.style.left = Math.min(rect.right, window.innerWidth - 165) + 'px';
    dropdown.style.top  = (rect.bottom + 4) + 'px';
    dropdown.classList.add('open');
  }

  document.addEventListener('click', () => dropdown.classList.remove('open'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { dropdown.classList.remove('open'); closeConfirm(); } });

  document.getElementById('dd-edit-btn').addEventListener('click', () => {
    dropdown.classList.remove('open');
    if (ddType === 'note')    openNoteModal(ddIndex);
    if (ddType === 'quote')   openQuoteModal(ddIndex);
    if (ddType === 'episode') openEpModal(ddIndex);
  });

  document.getElementById('dd-delete-btn').addEventListener('click', () => {
    dropdown.classList.remove('open');
    const labels = { note: 'note', quote: 'quote', episode: 'episode' };
    let label = '';
    if (ddType==='note')    label = `"${currentSource.keyIdeas[ddIndex]?.heading}"`;
    if (ddType==='quote')   label = `quote by ${currentSource.quotes[ddIndex]?.attribution||''}`;
    if (ddType==='episode') label = `episode "${currentSource.episodes[ddIndex]?.title}"`;
    openConfirm(`Delete ${label}?`, () => deleteItem(ddType, ddIndex));
  });

  // ── CONFIRM ──
  let confirmCb = null;
  function openConfirm(msg, cb) { document.getElementById('confirm-msg').textContent = msg; confirmCb = cb; document.getElementById('confirm-dialog').classList.add('open'); }
  function closeConfirm() { document.getElementById('confirm-dialog').classList.remove('open'); confirmCb = null; }
  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!confirmCb) return;
    const btn = document.getElementById('confirm-delete-btn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    await confirmCb();
    btn.disabled = false; btn.textContent = 'Delete';
    closeConfirm();
  });

  // ── DELETE ──
  async function deleteItem(type, index) {
    try {
      let msg = '';
      await saveToGitHub(s => {
        if (type==='note')    { msg = `Delete note: ${s.keyIdeas[index]?.heading}`;   s.keyIdeas.splice(index,1); }
        if (type==='quote')   { msg = `Delete quote: ${s.quotes[index]?.attribution}`; s.quotes.splice(index,1); }
        if (type==='episode') { msg = `Delete episode: ${s.episodes[index]?.title}`;  s.episodes.splice(index,1); }
      }, msg || 'Delete item');
      if (type==='note')    currentSource.keyIdeas.splice(index,1);
      if (type==='quote')   currentSource.quotes.splice(index,1);
      if (type==='episode') currentSource.episodes.splice(index,1);
      renderSource(currentSource);
      showToast('✓ Deleted', 'success');
    } catch(err) { showToast('Error: '+err.message, 'error'); }
  }

  // ── NOTE MODAL ──
  let editingNote = null;
  function openNoteModal(index) {
    editingNote = (index !== undefined) ? index : null;
    const isEdit = editingNote !== null;
    document.getElementById('note-modal-title').textContent = isEdit ? 'Edit note' : 'Add a note';
    document.getElementById('note-save-btn').textContent    = isEdit ? 'Save changes' : 'Save note';
    if (isEdit) {
      const n = currentSource.keyIdeas[editingNote];
      document.getElementById('note-heading').value = n.heading;
      document.getElementById('note-text').value    = n.text;
    } else {
      document.getElementById('note-heading').value = '';
      document.getElementById('note-text').value    = '';
    }
    document.getElementById('note-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('note-heading').focus(), 50);
  }
  function closeNoteModal() { document.getElementById('note-modal-overlay').classList.remove('open'); editingNote = null; }

  async function saveNote() {
    const heading = document.getElementById('note-heading').value.trim();
    const text    = document.getElementById('note-text').value.trim();
    if (!heading||!text) { showToast('Please fill in both fields.', 'error'); return; }
    const btn = document.getElementById('note-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const isEdit = editingNote !== null;
      await saveToGitHub(s => {
        s.keyIdeas = s.keyIdeas || [];
        if (isEdit) s.keyIdeas[editingNote] = { ...s.keyIdeas[editingNote], heading, text };
        else        s.keyIdeas.push({ heading, text });
      }, isEdit ? `Edit note: ${heading}` : `Add note: ${heading}`);
      currentSource.keyIdeas = currentSource.keyIdeas || [];
      if (isEdit) currentSource.keyIdeas[editingNote] = { ...currentSource.keyIdeas[editingNote], heading, text };
      else        currentSource.keyIdeas.push({ heading, text });
      renderSource(currentSource); closeNoteModal();
      showToast(isEdit ? '✓ Note updated!' : '✓ Note saved!', 'success');
    } catch(err) { showToast('Error: '+err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = editingNote !== null ? 'Save changes' : 'Save note'; }
  }

  // ── QUOTE MODAL ──
  let editingQuote = null;
  function openQuoteModal(index) {
    editingQuote = (index !== undefined) ? index : null;
    const isEdit = editingQuote !== null;
    document.getElementById('quote-modal-title').textContent = isEdit ? 'Edit quote' : 'Add a quote';
    document.getElementById('quote-save-btn').textContent    = isEdit ? 'Save changes' : 'Save quote';
    if (isEdit) {
      const q = currentSource.quotes[editingQuote];
      document.getElementById('quote-text').value = q.text;
      document.getElementById('quote-attr').value = q.attribution;
    } else {
      document.getElementById('quote-text').value = '';
      document.getElementById('quote-attr').value = '';
    }
    document.getElementById('quote-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('quote-text').focus(), 50);
  }
  function closeQuoteModal() { document.getElementById('quote-modal-overlay').classList.remove('open'); editingQuote = null; }

  async function saveQuote() {
    const text = document.getElementById('quote-text').value.trim();
    const attr = document.getElementById('quote-attr').value.trim();
    if (!text||!attr) { showToast('Please fill in both fields.', 'error'); return; }
    const btn = document.getElementById('quote-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const isEdit = editingQuote !== null;
      await saveToGitHub(s => {
        s.quotes = s.quotes || [];
        if (isEdit) s.quotes[editingQuote] = { text, attribution: attr };
        else        s.quotes.push({ text, attribution: attr });
      }, isEdit ? `Edit quote: ${attr}` : `Add quote: ${attr}`);
      currentSource.quotes = currentSource.quotes || [];
      if (isEdit) currentSource.quotes[editingQuote] = { text, attribution: attr };
      else        currentSource.quotes.push({ text, attribution: attr });
      renderSource(currentSource); closeQuoteModal();
      showToast(isEdit ? '✓ Quote updated!' : '✓ Quote saved!', 'success');
    } catch(err) { showToast('Error: '+err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = editingQuote !== null ? 'Save changes' : 'Save quote'; }
  }

  // ── EPISODE MODAL ──
  let editingEp = null;
  function openEpModal(index) {
    editingEp = (index !== undefined) ? index : null;
    const isEdit = editingEp !== null;
    document.getElementById('ep-modal-title').textContent = isEdit ? 'Edit episode' : 'Add an episode';
    document.getElementById('ep-save-btn').textContent    = isEdit ? 'Save changes' : 'Save episode';
    if (isEdit) {
      const ep = currentSource.episodes[editingEp];
      document.getElementById('ep-number').value = ep.number;
      document.getElementById('ep-title').value  = ep.title;
      document.getElementById('ep-tips').value   = (ep.tips||[]).join('\n');
      document.getElementById('ep-qa').value     = (ep.qa||[]).map(q => `${q.q} | ${q.a}`).join('\n');
    } else {
      const nextNum = ((currentSource.episodes||[]).length) + 1;
      document.getElementById('ep-number').value = nextNum;
      ['ep-title','ep-tips','ep-qa'].forEach(id => document.getElementById(id).value = '');
    }
    document.getElementById('ep-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('ep-title').focus(), 50);
  }
  function closeEpModal() { document.getElementById('ep-modal-overlay').classList.remove('open'); editingEp = null; }

  async function saveEpisode() {
    const number = parseInt(document.getElementById('ep-number').value);
    const title  = document.getElementById('ep-title').value.trim();
    if (!title||isNaN(number)) { showToast('Please fill in number and title.', 'error'); return; }
    const tips = document.getElementById('ep-tips').value.trim().split('\n').map(l=>l.trim()).filter(Boolean);
    const qa   = document.getElementById('ep-qa').value.trim().split('\n').map(l=>l.trim()).filter(Boolean).map(l => { const p=l.split('|').map(x=>x.trim()); return {q:p[0],a:p[1]||''}; });
    const btn  = document.getElementById('ep-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const isEdit = editingEp !== null;
      await saveToGitHub(s => {
        s.episodes = s.episodes || [];
        if (isEdit) s.episodes[editingEp] = { number, title, tips, qa };
        else        s.episodes.push({ number, title, tips, qa });
      }, isEdit ? `Edit episode: ${title}` : `Add episode: ${title}`);
      currentSource.episodes = currentSource.episodes || [];
      if (isEdit) currentSource.episodes[editingEp] = { number, title, tips, qa };
      else        currentSource.episodes.push({ number, title, tips, qa });
      renderSource(currentSource); closeEpModal();
      showToast(isEdit ? '✓ Episode updated!' : '✓ Episode saved!', 'success');
    } catch(err) { showToast('Error: '+err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = editingEp !== null ? 'Save changes' : 'Save episode'; }
  }

  // Close modals on overlay click
  ['note-modal-overlay','quote-modal-overlay','ep-modal-overlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
  });
</script>
</body>
</html>
